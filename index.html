<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextBuy Store</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

header {
  background:#111;
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  flex-wrap:wrap;
}

header h1 {
  margin:0;
  font-size:24px;
}

.search-box input {
  padding:8px;
  width:200px;
  border-radius:5px;
  border:none;
}

.categories {
  display:flex;
  gap:15px;
  padding:10px 20px;
  flex-wrap:wrap;
}

.categories div {
  background:#fff;
  padding:10px 15px;
  border-radius:5px;
  cursor:pointer;
  box-shadow:0 0 5px rgba(0,0,0,0.1);
  transition:0.3s;
}

.categories div:hover {background:#ddd;}

.container {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  transition:0.3s;
  position:relative;
}

.card:hover {transform: translateY(-5px);}

.card img {
  width:100%;
  border-radius:10px;
}

.card .price {
  color:green;
  font-weight:bold;
  margin:10px 0;
}

.card .tag {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 8px;
  font-size:12px;
  border-radius:5px;
}

.card .delivery {
  color:blue;
  font-weight:bold;
  margin-bottom:10px;
}

.card button {
  background:#25D366;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

.card button:hover {
  background:#128C7E;
}

footer {
  background:#111;
  color:#fff;
  text-align:center;
  padding:10px;
  margin-top:20px;
}

@media(max-width:600px){
  .search-box input {width:100%;}
}

@media(max-width:400px){
  .categories {flex-direction:column;}
  .container {gap:10px;}
}
</style>
</head>
<body>

<header>
  <h1>NextBuy Store</h1>
  <div class="search-box">
    <input type="text" placeholder="Search product..." onkeyup="searchProduct()">
  </div>
</header>

<div class="categories">
  <div onclick="filterCategory('All')">All</div>
  <div onclick="filterCategory('Watch')">Watches</div>
  <div onclick="filterCategory('Headphone')">Headphones</div>
  <div onclick="filterCategory('Speaker')">Speakers</div>
</div>

<div class="container" id="productList">

  <div class="card" data-category="Watch">
    <span class="tag">New</span>
    <img src="https://via.placeholder.com/250?text=Smart+Watch">
    <h3>Smart Watch</h3>
    <p class="price">Rs 1999</p>
    <p class="delivery">Free Delivery Pakistan</p>
    <button onclick="order('Smart Watch')">Order Now</button>
  </div>

  <div class="card" data-category="Headphone">
    <span class="tag" style="background:orange">Sale</span>
    <img src="https://via.placeholder.com/250?text=Headphones">
    <h3>Headphones</h3>
    <p class="price">Rs 999</p>
    <p class="delivery">Free Delivery Pakistan</p>
    <button onclick="order('Headphones')">Order Now</button>
  </div>

  <div class="card" data-category="Speaker">
    <span class="tag" style="background:green">Hot</span>
    <img src="https://via.placeholder.com/250?text=Speaker">
    <h3>Bluetooth Speaker</h3>
    <p class="price">Rs 1499</p>
    <p class="delivery">Free Delivery Pakistan</p>
    <button onclick="order('Bluetooth Speaker')">Order Now</button>
  </div>

  <div class="card" data-category="Watch">
    <span class="tag">New</span>
    <img src="https://via.placeholder.com/250?text=Luxury+Watch">
    <h3>Luxury Watch</h3>
    <p class="price">Rs 2499</p>
    <p class="delivery">Free Delivery Pakistan</p>
    <button onclick="order('Luxury Watch')">Order Now</button>
  </div>

</div>

<footer>
  <p>NextBuy Store | WhatsApp: 03070694263</p>
</footer>

<script>
function order(product){
  let number = "923070694263"; // apna WhatsApp number yahan dal do
  let url = "https://wa.me/" + number + "?text=I want to order " + product;
  window.open(url,"_blank");
}

function searchProduct(){
  let input = document.querySelector('input').value.toLowerCase();
  let cards = document.querySelectorAll('.card');
  cards.forEach(card=>{
    let name = card.querySelector('h3').innerText.toLowerCase();
    let category = card.getAttribute('data-category').toLowerCase();
    card.style.display = name.includes(input) || category.includes(input) ? 'block' : 'none';
  });
}

function filterCategory(cat){
  let cards = document.querySelectorAll('.card');
  cards.forEach(card=>{
    if(cat==='All' || card.getAttribute('data-category')===cat){
      card.style.display='block';
    } else {
      card.style.display='none';
    }
  });
}
</script>

</body>
</html>
